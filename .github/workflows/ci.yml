name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Accessibility gate (axe, all routes × light/dark)
        run: |
          npm run start -- -p 3200 &
          for i in $(seq 1 40); do curl -sf http://localhost:3200 >/dev/null && break; sleep 2; done
          BASE_URL=http://localhost:3200 npm run test:a11y
